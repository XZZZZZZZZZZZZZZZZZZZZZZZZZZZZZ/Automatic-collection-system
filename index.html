<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPG | כניסה למערכת</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #15191d;
            --neon: #00ff88;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0,255,136,0.1);
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        h2 { margin-bottom: 30px; font-weight: 300; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #0b0e11;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--neon); }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--neon);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.4); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">TPG</div>
        <h2>ניהול גבייה אוטומטית</h2>
        <form id="loginForm">
            <input type="email" placeholder="אימייל" required>
            <input type="password" placeholder="סיסמה" required>
            <button type="submit" class="btn">התחבר למערכת</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const password = e.target.querySelector('input[type="password"]').value;
            const btn = e.target.querySelector('.btn');
            
            btn.innerText = 'מתחבר...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (data.success) {
                    alert('התחברת בהצלחה! שלום ' + data.user.business_name);
                    // כאן נעשה את המעבר לדאשבורד בשלב הבא
                } else {
                    alert(data.message);
                    btn.innerText = 'התחבר למערכת';
                }
            } catch (err) {
                alert('שגיאה בתקשורת עם השרת');
                btn.innerText = 'התחבר למערכת';
            }
        });
    </script>
</body>
</html>
