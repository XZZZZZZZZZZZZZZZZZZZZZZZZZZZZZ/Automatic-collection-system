<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPG - התחברות</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { 
            color: #2ea043; 
            font-size: 40px; 
            margin-bottom: 5px; 
            font-weight: 900;
        }
        h2 { 
            color: #8b949e; 
            font-size: 20px; 
            margin-bottom: 30px; 
            font-weight: normal; 
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            box-sizing: border-box;
            direction: ltr; /* משאיר את האימייל והסיסמה משמאל לימין */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #2ea043; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>TPG</h1>
    <h2>ניהול גבייה אוטומטית</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="test@tpg.com" required>
        <input type="password" id="password" placeholder="••••••" required>
        <button type="submit">מתחבר...</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // עוצר את רענון הדף האוטומטי

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                // מקפיץ את הודעת ההצלחה שראית
                alert("התחברת בהצלחה! שלום " + data.business_name);
                
                // ההעברה ללוח הבקרה!
                window.location.href = "/dashboard.html";
            } else {
                alert("שגיאה: " + (data.error || "פרטי התחברות שגויים"));
            }
        } catch (err) {
            alert("שגיאה בתקשורת עם השרת: " + err.message);
        }
    });
</script>

</body>
</html>
