<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>הגדרות גבייה - TPG</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { color: #2ea043; text-align: center; font-size: 32px; margin-bottom: 40px; font-weight: 900; }
        .nav-item { padding: 15px 25px; color: #8b949e; text-decoration: none; display: block; border-bottom: 1px solid #21262d; }
        .nav-item:hover, .nav-item.active { background-color: #238636; color: white; border-left: 4px solid #2ea043; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .box { background-color: #161b22; padding: 25px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; }
        input { padding: 10px; margin: 5px 0 15px 0; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 4px; width: 100%; box-sizing: border-box;}
        button { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>TPG</h2>
        <a href="dashboard.html" class="nav-item">לוח בקרה ראשי</a>
        <a href="clients.html" class="nav-item">ניהול לקוחות</a>
        <a href="history.html" class="nav-item">היסטוריית חיובים</a>
        <a href="settings.html" class="nav-item active">הגדרות גבייה</a>
        <a href="reports.html" class="nav-item">דוחות וסטטיסטיקה</a>
        <a href="index.html" class="nav-item" style="margin-top: auto; border-top: 1px solid #30363d; color: #f85149;">התנתקות המערכת</a>
    </div>
    <div class="main-content">
        <h1 style="color: white; margin-top: 0;">הגדרות גבייה ותקשורת</h1>
        <div class="box">
            <h3 style="margin-top:0; color:#2ea043;">חיבור חברת סליקה</h3>
            <label>מפתח API סליקה (Terminal Number):</label>
            <input type="text" placeholder="הכנס את המפתח מחברת האשראי">
            <button>שמור הגדרות סליקה</button>
        </div>
        <div class="box">
            <h3 style="margin-top:0; color:#2ea043;">הגדרות הודעות אוטומטיות</h3>
            <label>טקסט לתזכורת תשלום בוואטסאפ / מייל:</label>
            <input type="text" value="שלום, מצורף קישור לתשלום עבור המנוי החודשי. תודה!">
            <button>שמור הגדרות תקשורת</button>
        </div>
    </div>
</body>
</html>
